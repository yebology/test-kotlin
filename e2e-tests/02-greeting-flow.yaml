# Test Case: Greeting Flow
# Verifies user can type a name and receive a greeting

name: "Greeting Flow"
description: "Verify typing a name and tapping Say Hello shows greeting message"
platform: ["android"]
priority: high
preconditions:
  - "App is launched and on main screen"
  - "Name input field is empty"

steps:
  - action: tap
    element: "Name Input"
    accessibility_label: "Name Input"
    description: "Tap on name input field to focus it"

  - action: type
    text: "Yobel"
    description: "Type a name into the input field"

  - action: tap
    element: "Say Hello"
    accessibility_label: "Greet Button"
    description: "Tap the Say Hello button"

  - action: assert_visible
    element: "Hello, Yobel!"
    type: text
    accessibility_label: "Greeting Result"
    description: "Verify greeting message appears with the entered name"

expected_result: "Greeting text 'Hello, Yobel!' is displayed after tapping Say Hello"
