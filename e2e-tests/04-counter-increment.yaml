# Test Case: Counter Increment
# Verifies counter increments correctly when +1 button is tapped

name: "Counter Increment"
description: "Verify tapping +1 button increments the counter"
platform: ["android"]
priority: high
preconditions:
  - "App is launched and on main screen"
  - "Counter is at 0"

steps:
  - action: assert_visible
    element: "Counter: 0"
    type: text
    accessibility_label: "Counter Display"
    description: "Verify counter starts at 0"

  - action: tap
    element: "+1"
    accessibility_label: "Increment Button"
    description: "Tap increment button once"

  - action: assert_visible
    element: "Counter: 1"
    type: text
    accessibility_label: "Counter Display"
    description: "Verify counter shows 1"

  - action: tap
    element: "+1"
    accessibility_label: "Increment Button"
    description: "Tap increment button again"

  - action: assert_visible
    element: "Counter: 2"
    type: text
    accessibility_label: "Counter Display"
    description: "Verify counter shows 2"

  - action: tap
    element: "+1"
    accessibility_label: "Increment Button"
    description: "Tap increment button third time"

  - action: assert_visible
    element: "Counter: 3"
    type: text
    accessibility_label: "Counter Display"
    description: "Verify counter shows 3"

expected_result: "Counter increments by 1 on each tap of the +1 button"
