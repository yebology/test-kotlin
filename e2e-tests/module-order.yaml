# Module execution order and dependencies.
# Modules with depends_on will wait for their dependencies to complete first.
# Independent modules can run in parallel on separate emulators.

modules:
  - name: "Sign In"
    folder: "sign-in"
    # No dependencies — runs first (required by all others)

  - name: "Home Navigation"
    folder: "home-navigation"
    depends_on: ["sign-in"]

  - name: "Search"
    folder: "search"
    depends_on: ["sign-in"]

  - name: "Booking"
    folder: "booking"
    depends_on: ["sign-in", "home-navigation"]

  - name: "Ticketing"
    folder: "ticketing"
    depends_on: ["sign-in"]

  - name: "Profile"
    folder: "profile"
    depends_on: ["sign-in"]

  - name: "Settings"
    folder: "settings"
    depends_on: ["sign-in", "profile"]
