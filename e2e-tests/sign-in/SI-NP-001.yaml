name: "Sign In - Wrong Password"
description: "User sees error when entering incorrect password"
platform: [android, ios]
precondition: "App is on sign-in screen, user is logged out"
test_type: "negative"
module: "sign-in"
test_id: "SI-NP-001"

steps:
  - action: tap
    target:
      label: "Email Input"
    description: "Focus email field"

  - action: type
    text: "testuser@company.com"
    description: "Enter valid email"

  - action: press_button
    button: "BACK"
    description: "Dismiss keyboard"

  - action: tap
    target:
      label: "Password Input"
    description: "Focus password field"

  - action: type
    text: "WrongPassword999"
    description: "Enter incorrect password"

  - action: press_button
    button: "BACK"
    description: "Dismiss keyboard"

  - action: tap
    target:
      label: "Sign In Button"
      text: "Sign In"
    description: "Tap Sign In button"

  - action: assert
    condition:
      text_contains: "Invalid credentials"
      exists: true
    screenshot: true
    description: "Verify error message is displayed for wrong password"

expected_result: "Error message 'Invalid credentials' is shown, user stays on sign-in screen"
