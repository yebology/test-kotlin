name: "Sign In - Empty Fields"
description: "User sees validation when submitting empty form"
platform: [android, ios]
precondition: "App is on sign-in screen, all fields empty"
test_type: "negative"
module: "sign-in"
test_id: "SI-NP-002"

steps:
  - action: tap
    target:
      label: "Sign In Button"
      text: "Sign In"
    description: "Tap Sign In without entering any data"

  - action: assert
    condition:
      text_contains: "required"
      exists: true
    screenshot: true
    description: "Verify validation message appears for empty fields"

expected_result: "Validation error shown indicating email and password are required"
